name: StoryGen CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/storygen-backend .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/storygen-backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy storygen-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/storygen-backend \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GENMEDIA_BUCKET=${{ secrets.GCS_BUCKET }}"
